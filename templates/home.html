<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Device</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            user-select: none;
            -webkit-user-select: none; /* Chrome, Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* Older Edge */
            max-width: 100vw;
            height: 100vh;
            display: flex;
            box-sizing: border-box;
            text-align: center;
            align-items: center;
            justify-content: space-around;
            background: url("/static/images/game_board_desktop.png");
            background-size: 100% 100%;
        }
        .container{
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            width: 50vw;
            height: 80vh;
            background: url("/static/images/home.jpg");
            background-size: 100% 100%;      
            border-radius: 20px;
        }
        h1{
            color: azure;
        }
        a{
            text-decoration: none;
            height: 100px;
            text-align: center;
            border-radius: 7px;
            color: rgb(245, 245, 21);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s ease;
        }
        a:hover{
            transform: scale(1.1);
        }

        img {
            user-select: none;
            -webkit-user-drag: none;
        }

        @media screen and (max-width: 768px) {
            .container{
                width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍Welcome To Snake Ladder Game🎲</h1>
        <h1>Select Your Device💻</h1>
        <a href="/desktop_game" style="background: url('/static/images/desktop.png'); background-size: 100% 100%; width: 100px;">Desktop</a>
        <a href="/mobile_game" style="background: url('/static/images/mobile.png'); background-size: 100% 100%; width: 70px;">Mobile</a>
    </div>
    <script>
        document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
});
    </script>
</body>
</html>
